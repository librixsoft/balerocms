<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <meta content="no-cache, no-store, must-revalidate" http-equiv="cache-control"/>
    <meta content="0" http-equiv="expires"/>
    <meta content="no-cache" http-equiv="pragma"/>

    <title>Login</title>
    <base href="{basepath}">
    <link href="favicon.ico" rel="shortcut icon">

    <link href="assets/css/vendor/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/vendor/all.min.css" rel="stylesheet">
    <link href="assets/css/notification.css" rel="stylesheet">
    <link href="assets/css/login.css" rel="stylesheet">

    <script src="assets/js/vendor/vue.global.prod.js"></script>

    <style>
        :root {
            --login-bg: #1f2937;
            --login-surface: #374151;
            --login-border: rgba(255, 255, 255, 0.08);
            --login-text: #f8fafc;
            --login-muted: #cbd5e1;
            --login-primary: #1f2937;
            --login-focus: rgba(203, 213, 225, 0.25);
        }

        body.login-page {
            min-height: 100vh;
            margin: 0;
            background: var(--login-bg);
            color: var(--login-text);
            font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
        }

        .login-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1.25rem;
        }

        .login-card {
            width: min(92vw, 380px);
            background: var(--login-surface);
            border: 1px solid var(--login-border);
            border-radius: 22px;
            backdrop-filter: blur(12px);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .login-header {
            padding: 1.75rem 2rem 1rem;
            text-align: center;
        }

        .login-logo {
            max-height: 64px;
            width: auto;
        }

        .login-body {
            padding: 0.5rem 2rem 1.6rem;
        }

        .form-control.login-input {
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: #2f3947;
            padding: 0.78rem 0.95rem;
            color: var(--login-text);
            font-size: 0.95rem;
        }

        .form-control.login-input::placeholder {
            color: #cbd5e1;
        }

        .form-control.login-input:focus {
            border-color: #e2e8f0;
            box-shadow: 0 0 0 0.2rem var(--login-focus);
            background: #2f3947;
        }

        .btn-login {
            border: 0;
            border-radius: 12px;
            padding: 0.78rem 1rem;
            color: #fff;
            font-weight: 600;
            letter-spacing: 0.2px;
            background: var(--login-primary);
            box-shadow: 0 10px 18px rgba(15, 23, 42, 0.18);
            transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 24px rgba(15, 23, 42, 0.22);
            background: #111827;
            color: #fff;
        }

        .login-footer {
            text-align: center;
            padding: 1rem 1.5rem 1.4rem;
            border-top: 1px solid rgba(15, 23, 42, 0.06);
            font-size: 0.88rem;
        }

        .login-footer a {
            color: var(--login-muted);
            text-decoration: none;
        }

        .login-footer a:hover {
            color: var(--login-text);
        }

        .login-meta {
            margin-top: 1.2rem;
            text-align: center;
            font-size: 0.84rem;
            color: #94a3b8;
        }
    </style>
</head>
<body class="login-page">

<div class="login-shell">
    <div>
        <div class="login-card">
            <div class="login-header">
                <img class="login-logo img-fluid" src="assets/images/admin/logo.svg" alt="BaleroCMS Logo">
            </div>

            <div class="login-body">
                <%-- @if login_error -->
                <div class="vue-alert vue-alert-danger" role="alert">
                    <div class="vue-alert-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <div class="vue-alert-content">{login_error}</div>
                    <button class="vue-alert-close" aria-label="Close" onclick="this.parentElement.remove();">×</button>
                </div>
                <%-- @endif-->

                <form action="./login" method="POST">
                    <div class="mb-3">
                        <input class="form-control login-input" id="username" name="usr" placeholder="{login.username}" type="text">
                    </div>

                    <div class="mb-3">
                        <input class="form-control login-input" id="password" name="pwd" placeholder="{login.password}" type="password">
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-login" name="login" type="submit">
                            <i class="fas fa-sign-in-alt"></i> {login.submit}
                        </button>
                    </div>
                </form>
            </div>

            <div class="login-footer">
                <a href="./">{login.back}</a>
            </div>
        </div>

        <div class="login-meta">Built with BaleroCMS {core_version}</div>
    </div>
</div>

<!-- Módulos independientes -->
<script type="module" src="assets/js/notification.js"></script>

</body>
</html>

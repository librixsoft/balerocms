<!DOCTYPE html>
<html class="no-js">
<head>
    <title>{admin.edit_page} - {admin.mod_name}</title>
    <base href="{basepath}">
    <link href="favicon.ico" rel="shortcut icon">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">

    <link href="assets/css/vendor/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/vendor/all.min.css" rel="stylesheet">
    <link href="assets/css/notification.css" rel="stylesheet">
    <link href="assets/css/dashboard.css" media="screen" rel="stylesheet">
    <link href="assets/css/vendor/quill.snow.css" rel="stylesheet">

    <script src="assets/js/vendor/vue.global.prod.js"></script>
    <script src="assets/js/vendor/quill.min.js"></script>

</head>

<body>

<div id="app">
<%-- @include "admin/includes/navbar.html" -->
<div class="container-fluid">
    <div class="row">
        <%-- @include "admin/includes/sidebar.html" -->

        <main class="col-md-9 px-md-4" id="content">
            <div class="mb-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">{admin.edit_page}</h5>
                    </div>
                    <div class="card-body">
                        <form action="./admin/pages/edit/{page.id}" method="POST">
                            <fieldset>
                                <div class="mb-3 row">
                                    <label class="col-sm-2 col-form-label" for="virtual_title">{admin.title}</label>
                                    <div class="col-sm-10">
                                        <input class="form-control" id="virtual_title" name="virtual_title" required
                                               type="text" value="{page.virtual_title}">
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label class="col-sm-2 col-form-label" for="static_url">{admin.static_url}</label>
                                    <div class="col-sm-10">
                                        <input class="form-control" id="static_url" name="static_url" readonly
                                               style="background-color: #e9ecef; cursor: not-allowed;" type="text"
                                               value="{page.static_url}" title="{admin.readonly_field}">
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label class="col-sm-2 col-form-label" for="virtual_content">{admin.content}</label>
                                    <div class="col-sm-10">
                                        <div id="quill-editor" style="height:350px;"></div>
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label class="col-sm-2 col-form-label" for="visible">{admin.visible}</label>
                                    <div class="col-sm-10">
                                        <select class="form-select w-auto" id="visible" name="visible">
                                            <option value="1" selected="{page.visible_selected}">{admin.enabled}</option>
                                            <option value="0" selected="{page.hidden_selected}">{admin.disabled}</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label class="col-sm-2 col-form-label" for="created_at">{admin.date}</label>
                                    <div class="col-sm-10">
                                        <input class="form-control" id="created_at" name="created_at" readonly
                                               style="background-color: #e9ecef; cursor: not-allowed;" type="text"
                                               value="{page.created_at}" title="{admin.readonly_field}">
                                    </div>
                                </div>

                                <div class="d-flex justify-content-start">
                                    <button class="btn btn-primary me-2" name="submit" type="submit">
                                        <i class="fas fa-check"></i> {admin.save}
                                    </button>
                                    <a class="btn btn-secondary" href="{basepath}admin/pages">{admin.cancel}</a>
                                </div>

                            </fieldset>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <hr>
    <footer>
        <p>{admin.powered_by} <a href="#">Balero CMS</a>.</p>
    </footer>
</div>
</div>

<script type="module" src="assets/js/admin-theme.js"></script>

</body>
</html>

<!DOCTYPE html>
<html class="no-js">
<head>
    <title>Admin - {mod_name}</title>
    <!-- basepath -->
    <base href="{basepath}">
    <link href="favicon.ico" rel="shortcut icon">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">

    <link href="assets/css/vendor/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/vendor/all.min.css" rel="stylesheet">
    <link href="assets/css/notification.css" rel="stylesheet">
    <link href="assets/css/dashboard.css" media="screen" rel="stylesheet">
    <link href="assets/css/vendor/quill.snow.css" rel="stylesheet">

    <script src="assets/js/vendor/vue.global.prod.js"></script>
    <script src="assets/js/vendor/quill.min.js"></script>

</head>

<body>

<div id="app">
<%-- @include "admin/includes/navbar.html" -->
<div class="container-fluid">
    <div class="row">

        <%-- @include "admin/includes/sidebar.html" -->

        <main class="col-md-9 ms-sm-auto col-lg-9 px-md-4" id="content">
            <div class="row mb-3">

                <!-- block -->
                <div class="card">

                    <div class="card-header">
                        <ul class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a href="./admin">Dashboard</a></li>
                            <li aria-current="page" class="breadcrumb-item active">{mod_name}</li>
                        </ul>
                    </div>

                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-bordered align-middle">
                                <thead class="table-light">
                                <tr>
                                    <th>{admin.title}</th>
                                    <th>{admin.action}</th>
                                </tr>
                                </thead>
                                <tbody>
                                <%-- @foreach pages as page -->
                                <tr>
                                    <td>{page.virtual_title}</td>
                                    <td>
                                        <a class="btn btn-sm btn-info" href="./admin/pages/edit/{page.id}">
                                            <i class="fas fa-pencil-alt"></i> {admin.edit}
                                        </a>

                                        <form action="./admin/pages/delete/{page.id}" method="post"
                                              onsubmit="return confirm('{admin.confirm_delete}')"
                                              style="display:inline;">
                                            <button class="btn btn-sm btn-danger" type="submit">
                                                <i class="fas fa-trash"></i> {admin.delete}
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                <%-- @endforeach -->
                                </tbody>
                            </table>
                        </div>

                        <!-- Botón New Page abajo a la derecha -->
                        <div class="text-end mt-3">
                            <a class="btn btn-sm btn-info" href="./admin/new-page">
                                <i class="fas fa-plus"></i> {admin.new_page}
                            </a>
                        </div>
                    </div>
                </div>
                <!-- /block -->

            </div>
        </main>
    </div>
    <hr>
    <footer>
        <p>{admin.powered_by} <a href="#">Balero CMS</a>.</p>
    </footer>
</div>
</div>

<script type="module" src="assets/js/admin-theme.js"></script>

</body>
</html>

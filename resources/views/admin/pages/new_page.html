<!DOCTYPE html>
<html class="no-js">
<head>
    <title>Admin New Page - {mod_name}</title>
    <!--  basepath -->
    <base href="{basepath}">
    <link href="favicon.ico" rel="shortcut icon">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">

    <!-- Bootstrap CSS -->
    <link href="assets/css/vendor/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/dashboard.css" media="screen" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link href="assets/css/vendor/all.min.css" rel="stylesheet">

    <!-- Summernote CSS -->
    <link href="assets/css/summernote.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="assets/js/vendor/jquery.min.js"></script>

    <!-- Bootstrap Bundle JS (con Popper incluido) -->
    <script src="assets/js/vendor/bootstrap.bundle.min.js"></script>

    <!-- Summernote JS -->
    <script src="assets/js/summernote.min.js"></script>
</head>
<body>

<%-- @include "admin/includes/navbar.html" -->

<div class="container-fluid">
    <div class="row">
        <!-- Incluimos el sidebar aquí -->
        <%-- @include "admin/includes/sidebar.html" -->

        <main class="col-md-9 px-md-4" id="content">
            <div class="mb-3">
                <!-- block -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">{new_page}</h5>
                    </div>
                    <div class="card-body">

                        <form action="./admin/pages/new" method="POST">
                            <fieldset>
                                <div class="mb-3 row">
                                    <label class="col-sm-2 col-form-label" for="virtual_title">{admin.title}</label>
                                    <div class="col-sm-10">
                                        <input class="form-control" id="virtual_title" name="virtual_title" required
                                               type="text">
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label class="col-sm-2 col-form-label" for="static_url">{admin.lbl_static_url}</label>
                                    <div class="col-sm-10">
                                        <input class="form-control" id="static_url" name="static_url" placeholder="Slug will be auto-generated"
                                               readonly
                                               style="background-color: #e9ecef; cursor: not-allowed;"
                                               type="text">
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label class="col-sm-2 col-form-label" for="virtual_content">{admin.lbl_content}</label>
                                    <div class="col-sm-10">
                                        <textarea class="summernote" name="virtual_content"></textarea>
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label class="col-sm-2 col-form-label" for="visible">{admin.visible}</label>
                                    <div class="col-sm-10">
                                        <select class="form-select w-auto" id="visible" name="visible">
                                            <option selected value="1">{admin.enabled}</option>
                                            <option value="0">{admin.disabled}</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label class="col-sm-2 col-form-label" for="date">{admin.lbl_date}</label>
                                    <div class="col-sm-10">
                                        <input class="form-control" id="date" name="date" readonly
                                               style="background-color: #e9ecef; cursor: not-allowed;" type="text"
                                               value="{current_date}">
                                    </div>
                                </div>

                                <div class="d-flex justify-content-start">
                                    <button class="btn btn-primary me-2" name="submit" type="submit"><i
                                            class="fas fa-check"></i> {btn_add}
                                    </button>
                                    <a class="btn btn-secondary" href="{basepath}admin/pages">Cancel</a>
                                </div>

                            </fieldset>
                        </form>

                    </div>
                </div>
                <!-- /block -->
            </div>
        </main>
    </div>
    <hr>
    <footer>
        <p>Powered by <a href="#">Balero CMS</a>.</p>
    </footer>
</div>

<script>
    $(document).ready(function () {
        $('.summernote').summernote({
            height: 350,
            callbacks: {
                onImageUpload: function (files) {
                    sendFile(files[0]);
                }
            }
        });

        function sendFile(file) {
            var data = new FormData();
            data.append("file", file);
            $.ajax({
                data: data,
                type: "POST",
                url: "{basepath}admin/uploader",
                cache: false,
                contentType: false,
                processData: false,
                success: function (url) {
                    $('.summernote').summernote('insertImage', url);
                }
            });
        }

        // Auto-generar slug para static_url al escribir título
        $('#virtual_title').on('input', function () {
            var title = $(this).val();
            var slug = title.toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .trim()
                .replace(/[\s_-]+/g, '-')
                .replace(/^-+|-+$/g, '');
            $('#static_url').val(slug);
        });
    });
</script>

</body>
</html>

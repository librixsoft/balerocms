<form action="./admin/pages/new" method="POST">
    <fieldset>
        <div class="mb-3 row">
            <label class="col-sm-2 col-form-label" for="virtual_title">{admin.title}</label>
            <div class="col-sm-10">
                <input class="form-control" id="virtual_title" name="virtual_title"
                       required
                       v-model="virtualTitle"
                       type="text">
            </div>
        </div>

        <div class="mb-3 row">
            <label class="col-sm-2 col-form-label" for="static_url">{admin.lbl_static_url}</label>
            <div class="col-sm-10">
                <input class="form-control" id="static_url" name="static_url" placeholder="Slug will be auto-generated"
                       readonly
                       v-model="staticUrl"
                       style="background-color: #e9ecef; cursor: not-allowed;"
                       type="text">
            </div>
        </div>

        <div class="mb-3 row">
            <label class="col-sm-2 col-form-label" for="virtual_content">{admin.lbl_content}</label>
            <div class="col-sm-10">
                <textarea id="summernote" name="virtual_content" style="height:350px;"></textarea>
            </div>
        </div>

        <div class="mb-3 row">
            <label class="col-sm-2 col-form-label" for="visible">{admin.visible}</label>
            <div class="col-sm-10">
                <div class="form-check form-switch">
                    <input class="form-check-input"
                           type="checkbox"
                           role="switch"
                           id="visible"
                           v-model="visibleToggle">
                </div>
                <input type="hidden" name="visible" :value="visible">
            </div>
        </div>

        <div class="mb-3 row">
            <label class="col-sm-2 col-form-label" for="date">{admin.lbl_date}</label>
            <div class="col-sm-10">
                <input class="form-control" id="date" name="date" readonly
                       style="background-color: #e9ecef; cursor: not-allowed;" type="text"
                       value="{current_date}">
            </div>
        </div>

        <div class="d-flex justify-content-end">
            <button class="btn btn-primary me-2" name="submit" type="submit"><i
                    class="fas fa-check"></i> {btn_add}
            </button>
            <a class="btn btn-secondary" href="{basepath}admin/pages">Cancel</a>
        </div>

    </fieldset>
</form>

<form action="./admin/blocks/new" method="post">
<div class="mb-3">
        <label class="form-label" for="block_name">{admin.name}</label>
        <input type="text" id="block_name" class="form-control" name="name">
    </div>

    <div class="mb-3">
        <label class="form-label" for="sort_order">{admin.order}</label>
        <input type="number" id="sort_order" class="form-control" name="sort_order" value="0">
    </div>

    <div class="mb-3">
        <label class="form-label">{admin.content}</label>
        <textarea id="summernote" name="content" style="height:350px;"></textarea>
    </div>

    <div class="text-end">
        <button type="submit" class="btn btn-sm btn-primary">
            <i class="fas fa-plus"></i> {admin.create}
        </button>
    </div>
</form>

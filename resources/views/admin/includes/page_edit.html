<form action="./admin/pages/edit/{page.id}" method="POST">
    <fieldset>
        <div class="mb-3 row">
            <label class="col-sm-2 col-form-label" for="virtual_title">{admin.title}</label>
            <div class="col-sm-10">
                <input class="form-control"
                       id="virtual_title"
                       name="virtual_title"
                       required
                       v-model="virtualTitle"
                       type="text" value="{page.virtual_title}">
            </div>
        </div>

        <div class="mb-3 row">
            <label class="col-sm-2 col-form-label" for="static_url">{admin.static_url}</label>
            <div class="col-sm-10">
                <input class="form-control" id="static_url" name="static_url" readonly
                       v-model="staticUrl"
                       style="background-color: #e9ecef; cursor: not-allowed;" type="text"
                       value="{page.static_url}" title="{admin.readonly_field}">
            </div>
        </div>

        <div class="mb-3 row">
            <label class="col-sm-2 col-form-label" for="virtual_content">{admin.content}</label>
            <div class="col-sm-10">
                <textarea id="summernote" name="virtual_content" style="height:350px;">{page.virtual_content}</textarea>
            </div>
        </div>

        <div class="mb-3 row">
            <label class="col-sm-2 col-form-label" for="visible">{admin.visible}</label>
            <div class="col-sm-10">
                <div class="form-check form-switch d-flex align-items-center" style="min-height: 38px;">
                    <input class="form-check-input"
                           type="checkbox"
                           role="switch"
                           id="visible"
                           v-model="visibleToggle"
                           style="width: 3rem; height: 1.5rem; cursor: pointer;">
                </div>
                <input type="hidden" name="visible" :value="visible">
            </div>
        </div>

        <div class="mb-3 row">
            <label class="col-sm-2 col-form-label" for="created_at">{admin.date}</label>
            <div class="col-sm-10">
                <input class="form-control" id="created_at" name="created_at" readonly
                       style="background-color: #e9ecef; cursor: not-allowed;" type="text"
                       value="{page.created_at}" title="{admin.readonly_field}">
            </div>
        </div>

        <div class="d-flex justify-content-end">
            <a class="btn btn-secondary me-2" href="{basepath}admin/pages">{admin.cancel}</a>
            <button class="btn btn-primary" name="submit" type="submit">
                <i class="fas fa-check"></i> {admin.save}
            </button>
        </div>

    </fieldset>
</form>

<script>
    window.PAGE_DATA = {
        virtualTitle: '{page.virtual_title}',
        staticUrl: '{page.static_url}',
        visible: '{page.visible}'
    };
</script>

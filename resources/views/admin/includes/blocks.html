<%-- @if mod_id == "all_blocks" -->
<!-- LISTA DE BLOQUES -->
<table class="table table-striped">
    <thead>
    <tr>
        <th>{admin.order}</th>
        <th>{admin.name}</th>
        <th>{admin.actions}</th>
    </tr>
    </thead>
    <tbody>
    <%-- @foreach blocks as block -->
    <tr>
        <td>{block.sort_order}</td>
        <td>{block.name}</td>
        <td>
            <a class="btn btn-sm btn-primary me-2" href="./admin/blocks/edit/{block.id}">
                <i class="fas fa-pencil-alt"></i> {admin.edit}
            </a>
            <form action="./admin/blocks/delete/{block.id}" method="post"
                  onsubmit="return confirm('Delete this block?')"
                  style="display:inline;">
                <button class="btn btn-sm btn-secondary" type="submit">
                    <i class="fas fa-trash"></i> {admin.delete}
                </button>
            </form>
        </td>
    </tr>
    <%-- @endforeach -->
    </tbody>
</table>

<div class="text-end mt-3">
    <a class="btn btn-sm btn-primary" href="./admin/blocks/new">
        <i class="fas fa-plus"></i> {admin.new_block}
    </a>
</div>
<%-- @endif -->

<%-- @if mod_id == "block_new" OR mod_id == "block_edit" -->
<!-- FORMULARIO (NEW Y EDIT) -->
<form action="{mod_id == 'block_new' ? './admin/blocks/new' : './admin/blocks/edit/' + block.id}" method="post">
    <div class="mb-3">
        <label class="form-label" for="block_name">{admin.name}</label>
        <input type="text"
               id="block_name"
               class="form-control"
               name="name"
               value="{block.name == '' ? '' : block.name}"
               required>
    </div>

    <div class="mb-3">
        <label class="form-label" for="sort_order">{admin.order}</label>
        <input type="number"
               id="sort_order"
               class="form-control"
               name="sort_order"
               value="{mod_id == 'block_new' ? next_sort_order : block.sort_order}"
               required>
    </div>

    <div class="mb-3">
        <label class="form-label">{admin.content}</label>
        <textarea id="summernote" name="content" style="height:350px;">{block.content == '' ? '' : block.content}</textarea>
    </div>

    <div class="text-end">
        <button type="submit" class="btn btn-sm btn-primary">
            <i class="fas {mod_id == 'block_new' ? 'fa-plus' : 'fa-save'}"></i>
            {mod_id == 'block_new' ? admin.create : admin.save}
        </button>
    </div>
</form>
<%-- @endif -->

<form action="./admin/settings" method="POST">
    <fieldset>
        <legend>{admin.settings}</legend>

        <div class="row mb-3">
            <label for="core" class="col-sm-3 col-form-label text-end">Core</label>
            <div class="col-sm-9">
                <input type="text" readonly class="form-control bg-secondary text-white"
                       id="core" name="core" value="{core_version}">
            </div>
        </div>

        <!-- Debug select -->
        <div class="row mb-3">
            <label for="debug" class="col-sm-3 col-form-label text-end">{admin.debug}</label>
            <div class="col-sm-9">
                <select class="form-select" id="debug" name="debug">
                    <%-- @foreach debugOptions as code => label -->
                    <%-- @if debug == code -->
                    <option selected value="{code}">{label}</option>
                    <%-- @else -->
                    <option value="{code}">{label}</option>
                    <%-- @endif -->
                    <%-- @endforeach -->
                </select>
            </div>
        </div>

        <div class="row mb-3">
            <label for="language" class="col-sm-3 col-form-label text-end">{admin.language}</label>
            <div class="col-sm-9">
                <select class="form-select" id="language" name="language">
                    <%-- @foreach languages as code => name -->
                    <%-- @if defaultLanguage == code -->
                    <option selected value="{code}">{name}</option>
                    <%-- @else -->
                    <option value="{code}">{name}</option>
                    <%-- @endif -->
                    <%-- @endforeach -->
                </select>
            </div>
        </div>

        <div class="row mb-3">
            <label for="theme" class="col-sm-3 col-form-label text-end">{admin.theme}</label>
            <div class="col-sm-9">
                <select class="form-select" id="theme" name="theme">
                    <%-- @foreach themes as t -->
                    <%-- @if defaultTheme == t -->
                    <option selected value="{t}">{t}</option>
                    <%-- @else -->
                    <option value="{t}">{t}</option>
                    <%-- @endif -->
                    <%-- @endforeach -->
                </select>
            </div>
        </div>

        <div class="row mb-3">
            <label for="typeahead" class="col-sm-3 col-form-label text-end">{admin.title}</label>
            <div class="col-sm-9">
                <input type="text" class="form-control" id="typeahead" name="title"
                       data-provide="typeahead" value="{txt_title}">
            </div>
        </div>

        <div class="row mb-3">
            <label for="keywords" class="col-sm-3 col-form-label text-end">{admin.keywords}</label>
            <div class="col-sm-9">
                <input type="text" class="form-control" id="keywords" name="keywords"
                       value="{txt_keywords}">
            </div>
        </div>

        <div class="row mb-3">
            <label for="url" class="col-sm-3 col-form-label text-end">{admin.url}</label>
            <div class="col-sm-9">
                <input type="text" class="form-control" id="url" name="url"
                       value="{txt_url}">
            </div>
        </div>

        <div class="row mb-3">
            <label for="description" class="col-sm-3 col-form-label text-end">{admin.description}</label>
            <div class="col-sm-9">
                                        <textarea class="form-control" id="description" name="description"
                                                  style="height:200px;">{txt_description}</textarea>
            </div>
        </div>

        <div class="row mb-3">
            <label for="footer" class="col-sm-3 col-form-label text-end">{admin.footer}</label>
            <div class="col-sm-9">
                                        <textarea class="form-control" id="footer" name="footer"
                                                  style="height:200px;">{txt_footer}</textarea>
            </div>
        </div>

        <div class="row mb-3">
            <div class="offset-sm-3 col-sm-9 d-flex justify-content-end">
                <button class="btn btn-primary me-2" name="submit" type="submit">{admin.save_changes}</button>
                <button class="btn btn-secondary" name="cancel" type="reset">{admin.cancel}</button>
            </div>
        </div>
    </fieldset>
</form>

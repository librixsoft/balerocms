<nav class="navbar-vue" :class="{ 'navbar-dark': isDark }">
    <div class="navbar-container">
        <!-- Logo -->
        <a class="navbar-brand" href="./">
            <img class="logo" src="assets/images/admin/logo.svg" alt="Logo">
        </a>

        <!-- Mobile toggle button -->
        <button
                class="navbar-toggler"
                @click="mobileMenuOpen = !mobileMenuOpen"
                aria-label="Toggle navigation"
        >
            <i class="fas fa-bars"></i>
        </button>

        <!-- Main nav content -->
        <div class="navbar-content" :class="{ 'mobile-open': mobileMenuOpen }">
            <!-- Left side -->
            <div class="navbar-left">
            </div>

            <!-- Right side -->
            <div class="navbar-right">
                <!-- Preview dropdown with eye icon -->
                <div class="nav-dropdown" @click.stop>
                    <button
                            class="icon-button"
                            @click="previewOpen = !previewOpen"
                            title="Preview"
                    >
                        <i class="fas fa-eye"></i>
                    </button>
                    <div class="dropdown-menu dropdown-menu-compact" v-show="previewOpen">
                        <a class="dropdown-item" href="./" target="_blank" @click="previewOpen = false">
                            <i class="fas fa-external-link-alt me-2"></i>Front-End
                        </a>
                    </div>
                </div>

                <!-- Language selector as icon -->
                <div class="nav-dropdown lang-dropdown" @click.stop>
                    <button
                            class="icon-button"
                            @click="langOpen = !langOpen"
                            title="Cambiar idioma"
                    >
                        <i class="fas fa-globe"></i>
                    </button>
                    <div class="dropdown-menu dropdown-menu-compact" v-show="langOpen">
                        <form class="lang-form-dropdown">
                            <select
                                    class="form-select-dropdown"
                                    id="lang"
                                    name="lang"
                                    @change="$event.target.form.submit()"
                            >
                                <option value="en" {lang_selected_en}>English</option>
                                <option value="es" {lang_selected_es}>Español</option>
                            </select>
                        </form>
                    </div>
                </div>

                <!-- Theme toggle -->
                <button
                        @click="toggleTheme"
                        class="icon-button"
                        :title="isDark ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
                >
                    <i :class="isDark ? 'fas fa-sun' : 'fas fa-moon'"></i>
                </button>

                <div class="navbar-separator"></div>

                <!-- User dropdown -->
                <div class="nav-dropdown user-dropdown" @click.stop>
                    <button
                            class="user-button"
                            @click="userMenuOpen = !userMenuOpen"
                    >
                        <!-- User info (hidden on mobile) -->
                        <div class="user-info">
                            <span class="username">{username}</span>
                            <span class="email">{email}</span>
                        </div>

                        <!-- Avatar -->
                        <div class="user-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                    </button>
                    <div class="dropdown-menu dropdown-menu-right" v-show="userMenuOpen">
                        <a class="dropdown-item" href="./login/logout" @click="userMenuOpen = false">
                            <i class="fas fa-sign-out-alt me-2"></i>{admin.logout}
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<nav class="navbar navbar-expand-lg fixed-top" :class="navbarClasses">
    <div class="container-fluid">
        <a class="navbar-brand" href="./">
            <img class="logo" src="assets/images/admin/logo.png">
        </a>
        <button
                aria-controls="navbarMain"
                aria-expanded="false"
                aria-label="Toggle navigation"
                class="navbar-toggler"
                data-bs-target="#navbarMain"
                data-bs-toggle="collapse"
                type="button"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 align-items-center">
                <!-- Dropdown Preview -->
                <li class="nav-item dropdown">

                    <a
                    aria-expanded="false"
                    class="nav-link dropdown-toggle"
                    data-bs-toggle="dropdown"
                    href="#"
                    id="previewDropdown"
                    role="button"
                    >
                    Preview
                    </a>
                    <ul aria-labelledby="previewDropdown" class="dropdown-menu">
                        <li><a class="dropdown-item" href="./" target="_blank">Front-End</a></li>
                    </ul>
                </li>

                <!-- Selector de idioma junto a Preview -->
                <li class="nav-item ms-3 d-flex align-items-center">
                    <label for="lang" class="me-2 mb-0">Idioma de sesión:</label>
                    <form class="d-flex m-0">
                        <select
                                class="form-select form-select-sm"
                                id="lang"
                                name="lang"
                                onchange="this.form.submit()"
                        >
                            <option value="en" {lang_selected_en}>English</option>
                            <option value="es" {lang_selected_es}>Español</option>
                        </select>
                    </form>
                </li>

            </ul>

            <!-- Toggle de tema y Dropdown usuario a la derecha -->
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">

                <li class="nav-item dropdown">

                    <a
                    aria-expanded="false"
                    class="nav-link dropdown-toggle"
                    data-bs-toggle="dropdown"
                    href="#"
                    id="userDropdown"
                    role="button"
                    >
                    <i class="fas fa-user"></i> {username} ({email})
                    </a>
                    <ul aria-labelledby="userDropdown" class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="./login/logout">{admin.logout}</a></li>
                    </ul>
                </li>

                <!-- Toggle Dark/Light Mode -->
                <li class="nav-item me-3">
                    <button
                            @click="toggleTheme"
                            class="btn btn-sm btn-outline-secondary"
                            :title="isDark ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
                    >
                        <i :class="isDark ? 'fas fa-sun' : 'fas fa-moon'"></i>
                    </button>
                </li>

            </ul>
        </div>
    </div>
</nav>

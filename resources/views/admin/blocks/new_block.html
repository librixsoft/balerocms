<!DOCTYPE html>
<html class="no-js">
<head>
    <title>New Block - {mod_name}</title>
    <base href="{basepath}">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS PRIMERO -->
    <link href="assets/css/vendor/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="assets/css/vendor/all.min.css" rel="stylesheet">

    <!-- Quill CSS -->
    <link href="assets/css/vendor/quill.snow.css" rel="stylesheet">

    <!-- Custom styles AL FINAL para que sobrescriba Bootstrap -->
    <link href="assets/css/dashboard.css" media="screen" rel="stylesheet">

    <script src="assets/js/vendor/vue.global.prod.js"></script>
    <script src="assets/js/vendor/quill.min.js"></script>
    <script src="assets/js/vendor/bootstrap.bundle.min.js"></script>

    <style>
        .ql-html {
            width: 28px !important;
        }
        .ql-html .ql-stroke {
            stroke: #444;
        }
        .ql-html svg {
            width: 18px;
            height: 18px;
        }
        #quill-editor.html-mode .ql-editor {
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            background-color: #f8f9fa;
        }
        #quill-editor.html-mode .ql-toolbar {
            pointer-events: none;
            opacity: 0.6;
        }
        #quill-editor.html-mode .ql-html {
            pointer-events: auto;
            opacity: 1;
        }
    </style>
</head>
<body :class="navbarClasses">

<div id="app">
    <%-- @include "admin/includes/navbar.html" -->
    <div class="container-fluid">
        <div class="row">
            <%-- @include "admin/includes/sidebar.html" -->
            <main class="col-md-9 ms-sm-auto col-lg-9 px-md-4">
                <div class="row mb-3">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">{admin.new_block}</h5>
                        </div>
                        <div class="card-body">
                            <form @submit.prevent="submitForm">
                                <div class="mb-3">
                                    <label class="form-label" for="block_name">{admin.name}</label>
                                    <input type="text" id="block_name" class="form-control" v-model="blockName" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label" for="sort_order">{admin.order}</label>
                                    <input type="number" id="sort_order" class="form-control" v-model.number="sortOrder" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">{admin.content}</label>
                                    <!-- Quill editor -->
                                    <div id="quill-editor" style="height:350px;"></div>
                                </div>

                                <div class="text-end">
                                    <button type="submit" class="btn btn-sm btn-success">
                                        <i class="fas fa-plus"></i> {admin.create}
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <hr>
        <footer>
            <p>Powered by <a href="#">Balero CMS</a>.</p>
        </footer>
    </div>
</div>

<!-- Configuración para el editor -->
<script>
    window.BLOCK_CONFIG = {
        nextSortOrder: {next_sort_order}
    };
</script>

<script src="assets/js/admin-theme.js"></script>
<script src="assets/js/editor.js"></script>

</body>
</html>

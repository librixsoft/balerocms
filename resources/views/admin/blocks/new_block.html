<!DOCTYPE html>
<html class="no-js">
<head>
    <title>New Block - {mod_name}</title>
    <base href="{basepath}">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="assets/css/vendor/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/vendor/all.min.css" rel="stylesheet">
    <link href="assets/css/notification.css" rel="stylesheet">
    <link href="assets/css/dashboard.css" media="screen" rel="stylesheet">
    <link href="assets/css/vendor/quill.snow.css" rel="stylesheet">

    <script src="assets/js/vendor/vue.global.prod.js"></script>
    <script src="assets/js/vendor/quill.min.js"></script>

</head>
<body>

<div id="app">
    <%-- @include "admin/includes/navbar.html" -->

    <div class="container-fluid">
        <div class="row">

            <%-- @include "admin/includes/sidebar.html" -->

            <main class="col-md-9 ms-sm-auto col-lg-9 px-md-4" id="content">
                <div id="admin-notifications"></div>

                <!-- Mantener contenido original -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">{admin.new_block}</h5>
                    </div>
                    <div class="card-body">
                        <form @submit.prevent="submitForm">
                            <div class="mb-3">
                                <label class="form-label" for="block_name">{admin.name}</label>
                                <input type="text" id="block_name" class="form-control" v-model="blockName" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="sort_order">{admin.order}</label>
                                <input type="number" id="sort_order" class="form-control" v-model.number="sortOrder" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">{admin.content}</label>
                                <!-- Quill editor -->
                                <div id="quill-editor" style="height:350px;"></div>
                            </div>

                            <div class="text-end">
                                <button type="submit" class="btn btn-sm btn-primary">
                                    <i class="fas fa-plus"></i> {admin.create}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                <!-- /card -->

            </main>
        </div>
    </div>

    <%-- @include "admin/includes/footer.html" -->

</div>

<!-- Configuración para el editor -->
<script>
    window.BLOCK_CONFIG = {
        nextSortOrder: {next_sort_order}
    };
</script>

<script type="module" src="assets/js/admin-theme.js"></script>

</body>
</html>

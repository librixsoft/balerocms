<!DOCTYPE html>
<html class="no-js">
<head>
    <title>Edit Block - {mod_name}</title>
    <base href="{basepath}">
    <link href="favicon.ico" rel="shortcut icon">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">

    <link href="assets/css/vendor/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/vendor/all.min.css" rel="stylesheet">
    <link href="assets/css/notification.css" rel="stylesheet">
    <link href="assets/css/dashboard.css" media="screen" rel="stylesheet">
    <link href="assets/css/vendor/quill.snow.css" rel="stylesheet">

    <script src="assets/js/vendor/vue.global.prod.js"></script>
    <script src="assets/js/vendor/quill.min.js"></script>

</head>
<body>

<div id="app">
    <%-- @include "admin/includes/navbar.html" -->

    <div class="container-fluid">
        <div class="row">

            <%-- @include "admin/includes/sidebar.html" -->

            <main class="col-md-9 ms-sm-auto col-lg-9 px-md-4" id="content">
                <div id="admin-notifications"></div>

                <!-- Mantener el contenido original del formulario -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">{admin.edit_block}</h5>
                    </div>
                    <div class="card-body">

                        <form action="./admin/blocks/edit/{block.id}" method="post">
                            <div class="mb-3">
                                <label class="form-label" for="block_name">{admin.name}</label>
                                <input class="form-control" id="block_name" name="name" required type="text"
                                       value="{block.name}">
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="sort_order">{admin.order}</label>
                                <input class="form-control" id="sort_order" name="sort_order" required
                                       type="number" value="{block.sort_order}">
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="block_content">{admin.content}</label>
                                <div id="quill-editor" style="height:350px;"></div>
                            </div>

                            <div class="text-end">
                                <button class="btn btn-sm btn-primary" type="submit">
                                    <i class="fas fa-save"></i> {admin.save}
                                </button>
                            </div>
                        </form>

                    </div>
                </div>
                <!-- /card -->

            </main>
        </div>
    </div>

    <%-- @include "admin/includes/footer.html" -->
</div>

<script type="module" src="assets/js/admin-theme.js"></script>

</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" role="img" aria-label="BaleroCMS logo">
  <defs>
    <linearGradient id="txtGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f77092"/>
      <stop offset="100%" stop-color="#a17ecb"/>
    </linearGradient>
    <linearGradient id="cmsGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#efc183"/>
      <stop offset="100%" stop-color="#f5eee3"/>
    </linearGradient>
  </defs>

  <!-- Lollipop icon (SVG recreation of reference) -->
  <g transform="translate(64,25) scale(0.36)">
    <!-- outer handle ring -->
    <path d="M44 18 C76 6, 124 14, 138 42 C146 58, 142 73, 125 84"
          fill="none" stroke="#000" stroke-width="6" stroke-linecap="round"/>
    <path d="M48 20 C78 10, 118 18, 131 43 C138 56, 136 68, 120 79"
          fill="none" stroke="#efe5d6" stroke-width="4.6" stroke-linecap="round"/>

    <!-- candy body -->
    <rect x="22" y="15" rx="18" ry="18" width="76" height="58"
          fill="#f77092" stroke="#000" stroke-width="6"/>

    <!-- stripes -->
    <rect x="23" y="31" width="74" height="7" fill="#f5eee3"/>
    <rect x="23" y="49" width="74" height="7" fill="#a17ecb"/>
    <rect x="23" y="57" width="74" height="6" fill="#f5eee3"/>

    <!-- face -->
    <rect x="43" y="42" width="2.6" height="4" rx="1.3" fill="#000"/>
    <rect x="66" y="42" width="2.6" height="4" rx="1.3" fill="#000"/>
    <path d="M54 49 q6 5 12 0" fill="none" stroke="#000" stroke-width="2.4" stroke-linecap="round"/>

    <!-- stick -->
    <rect x="50" y="71" width="16" height="24" rx="8" fill="#efc183" stroke="#000" stroke-width="6"/>
  </g>

  <!-- Wordmark -->
  <text x="119" y="55"
        font-family="'Baloo 2', 'Nunito', 'Poppins', 'Segoe UI', Arial, sans-serif"
        font-size="32"
        font-weight="700"
        letter-spacing="0.3"
        fill="url(#txtGrad)"
        stroke="rgba(15,23,42,0.10)"
        stroke-width="0.25"
        paint-order="stroke fill">Balero<tspan fill="url(#cmsGrad)" font-weight="800">CMS</tspan></text>

  <g opacity="0.95">
    <rect x="120" y="60" width="74" height="2.2" rx="1.1" fill="#94A3B8"/>
    <rect x="194" y="60" width="52" height="2.2" rx="1.1" fill="url(#cmsGrad)"/>
    <circle cx="251" cy="61" r="2.1" fill="#22D3EE"/>
  </g>
</svg>

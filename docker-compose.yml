version: "3.9"

services:
  # -----------------------------
  # PHP + PHPUnit + Xdebug
  # -----------------------------
  phpunit:
    build:
      context: .
      dockerfile: Dockerfile.phpunit
    container_name: phpunit-app
    network_mode: "service:mysql" # Comparte red para usar localhost
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      - XDEBUG_MODE=coverage
    command:
      - sh
      - -c
      - "git config --global --add safe.directory /app; php bin/cache_routes.php; php bin/cache_dtos.php; tail -f /dev/null"

  # -----------------------------
  # LAMP Stack (Apache + PHP oficial)
  # -----------------------------
  lamp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lamp-app
    network_mode: "service:mysql" # Comparte red para usar localhost
    volumes:
      - ./:/var/www/html
      - ./apache/vhost.conf:/etc/apache2/sites-enabled/000-default.conf
    restart: unless-stopped

  # -----------------------------
  # MySQL (contenedor independiente)
  # -----------------------------
  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: balero_cms
    # -----------------------------
    # OPCIÓN 1: MySQL en RAM (tmpfs, datos efímeros)
    # -----------------------------
    tmpfs:
      - /var/lib/mysql
    # -----------------------------
    # OPCIÓN 2: MySQL persistente en disco (modo producción)
    # Descomenta estas líneas y comenta la sección tmpfs ↑
    # -----------------------------
    # volumes:
    #   - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306" # Puerto MySQL
      - "8080:80"   # Puerto Apache (interno 80)
      - "8081:8081" # Puerto PhpMyAdmin (interno 8081)
    restart: unless-stopped

  # -----------------------------
  # PhpMyAdmin (administrador MySQL) (http://localhost:8081)
  # -----------------------------
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    network_mode: "service:mysql" # Comparte red para ver mysql en 127.0.0.1
    restart: unless-stopped
    environment:
      PMA_HOST: 127.0.0.1
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      APACHE_PORT: 8081 # Cambia el puerto interno para que no choque con LAMP
    depends_on:
      - mysql

  # -----------------------------
  # SonarQube (análisis estático)
  # -----------------------------
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"     # UI → http://localhost:9000
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    depends_on:
      - db
    restart: unless-stopped

  # -----------------------------
  # PostgreSQL para SonarQube
  # -----------------------------
  db:
    image: postgres:15
    container_name: postgres-sonar
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  mysql_data:
  postgres_data:
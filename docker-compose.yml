version: "3.9"

services:
  # -----------------------------
  # LAMP Stack (Apache + PHP + MySQL incluido)
  # -----------------------------
  lamp:
    image: mattrayner/lamp:latest-2004-php8
    container_name: lamp-app
    ports:
      - "8080:80"       # Apache → http://localhost:8080
      - "3307:3306"     # MySQL → localhost:3307
    volumes:
      - ./:/var/www/html
      - ./apache/vhost.conf:/etc/apache2/sites-enabled/000-default.conf
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: balero_cms
      MYSQL_USER: root
      MYSQL_PASSWORD: ""
    restart: unless-stopped

    # -----------------------------
    # OPCIÓN 1: MySQL en RAM (tmpfs, datos efímeros)
    # -----------------------------
    tmpfs:
      - /var/lib/mysql
    # -----------------------------
    # OPCIÓN 2: MySQL persistente en disco (modo producción)
    # Descomenta estas líneas y comenta la sección tmpfs ↑
    # -----------------------------
    # volumes:
    #   - mysql_data:/var/lib/mysql

  # -----------------------------
  # PhpMyAdmin (administrador MySQL)
  # -----------------------------
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"   # PhpMyAdmin → http://localhost:8081
    environment:
      PMA_HOST: lamp
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - lamp

  # -----------------------------
  # SonarQube (análisis estático)
  # -----------------------------
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"     # UI → http://localhost:9000
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    depends_on:
      - db
    restart: unless-stopped

  # -----------------------------
  # PostgreSQL para SonarQube
  # -----------------------------
  db:
    image: postgres:15
    container_name: postgres-sonar
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  # Solo se usa si activas MySQL persistente
  mysql_data:
  postgres_data:
